<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>تسجيل الدخول | VIBE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #ff6b35, #f7b733);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            direction: rtl;
            padding: 20px;
        }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .auth-card {
            background: #ffffff;
            border-radius: 32px;
            padding: 40px 32px;
            width: 100%;
            max-width: 440px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            animation: fadeInUp 0.5s ease;
        }
        
        body.dark-mode .auth-card {
            background: #000000;
            border: 1px solid #2f3336;
        }
        
        .auth-card h1 {
            font-size: 48px;
            font-weight: 800;
            margin-bottom: 28px;
            background: linear-gradient(135deg, #ff6b35, #f7b733);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .auth-card input {
            width: 100%;
            padding: 14px 18px;
            margin: 8px 0;
            border-radius: 12px;
            background: #f5f5f5;
            border: 1px solid #e0e0e0;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: all 0.3s;
        }
        
        .auth-card input:focus {
            border-color: #ff6b35;
            box-shadow: 0 0 0 3px rgba(255, 107, 53, 0.1);
        }
        
        body.dark-mode .auth-card input {
            background: #1a1a1a;
            border-color: #2f3336;
            color: white;
        }
        
        .auth-card button {
            width: 100%;
            padding: 12px;
            margin-top: 16px;
            background: linear-gradient(135deg, #ff6b35, #f7b733);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.1s;
        }
        
        .auth-card button:active {
            transform: scale(0.98);
        }
        
        .auth-form {
            display: none;
        }
        
        .auth-form.active {
            display: block;
            animation: fadeInUp 0.3s ease-out;
        }
        
        .error-msg {
            color: #ff6b35;
            font-size: 12px;
            margin-top: 8px;
            text-align: center;
        }
        
        .auth-link {
            margin-top: 28px;
            color: #8e8e8e;
            font-size: 13px;
        }
        
        .auth-link a {
            color: #ff6b35;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }
        
        .loading-spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid white;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-left: 8px;
            vertical-align: middle;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .btn-loading {
            opacity: 0.7;
            cursor: not-allowed;
        }
        
        .theme-toggle {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.5);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            color: white;
            font-size: 20px;
            cursor: pointer;
            z-index: 100;
        }
    </style>
</head>
<body>

<button class="theme-toggle" onclick="toggleTheme()">
    <i class="fas fa-moon"></i>
</button>

<div class="auth-card">
    <h1>VIBE</h1>
    
    <!-- Login Form -->
    <div id="loginForm" class="auth-form active">
        <div style="text-align: right; margin-bottom: 20px;">
            <h2 style="font-size: 22px; font-weight: 700;">تسجيل الدخول</h2>
            <p style="color: #8e8e8e; margin-top: 4px; font-size: 13px;">مرحباً بعودتك</p>
        </div>
        <input type="email" id="loginEmail" placeholder="البريد الإلكتروني" autocomplete="email">
        <input type="password" id="loginPassword" placeholder="كلمة المرور" autocomplete="current-password">
        <button id="loginBtn">تسجيل الدخول</button>
        <div id="loginMsg" class="error-msg"></div>
        <div class="auth-link">ليس لديك حساب؟ <a onclick="switchAuth('register')">إنشاء حساب</a></div>
    </div>
    
    <!-- Register Form -->
    <div id="registerForm" class="auth-form">
        <div style="text-align: right; margin-bottom: 20px;">
            <h2 style="font-size: 22px; font-weight: 700;">إنشاء حساب</h2>
            <p style="color: #8e8e8e; margin-top: 4px; font-size: 13px;">انضم إلى VIBE اليوم</p>
        </div>
        <input type="text" id="regName" placeholder="اسم المستخدم" autocomplete="name">
        <input type="email" id="regEmail" placeholder="البريد الإلكتروني" autocomplete="email">
        <input type="password" id="regPass" placeholder="كلمة المرور" autocomplete="new-password">
        <input type="password" id="regConfirmPass" placeholder="تأكيد كلمة المرور" autocomplete="off">
        <button id="registerBtn">إنشاء حساب</button>
        <div id="regMsg" class="error-msg"></div>
        <div class="auth-link">لديك حساب بالفعل؟ <a onclick="switchAuth('login')">تسجيل الدخول</a></div>
    </div>
</div>

<script src="firebase-config.js"></script>
<script>
    // ==================== VIBE Auth Page ====================
    
    // Theme Toggle
    function toggleTheme() {
        document.body.classList.toggle('dark-mode');
        const isDark = document.body.classList.contains('dark-mode');
        const btn = document.querySelector('.theme-toggle i');
        if (isDark) {
            btn.classList.remove('fa-moon');
            btn.classList.add('fa-sun');
        } else {
            btn.classList.remove('fa-sun');
            btn.classList.add('fa-moon');
        }
        localStorage.setItem('authTheme', isDark ? 'dark' : 'light');
    }
    
    // Load saved theme
    const savedTheme = localStorage.getItem('authTheme');
    if (savedTheme === 'dark') {
        document.body.classList.add('dark-mode');
        const btn = document.querySelector('.theme-toggle i');
        btn.classList.remove('fa-moon');
        btn.classList.add('fa-sun');
    }
    
    function switchAuth(type) {
        document.getElementById('loginForm').classList.remove('active');
        document.getElementById('registerForm').classList.remove('active');
        document.getElementById(type + 'Form').classList.add('active');
        clearErrors();
    }
    
    function clearErrors() {
        document.getElementById('loginMsg').innerHTML = '';
        document.getElementById('regMsg').innerHTML = '';
    }
    
    function showError(elementId, message) {
        const errorDiv = document.getElementById(elementId);
        errorDiv.innerHTML = message;
        setTimeout(() => {
            if (errorDiv) errorDiv.innerHTML = '';
        }, 5000);
    }
    
    function setLoading(btnId, isLoading, originalText) {
        const btn = document.getElementById(btnId);
        if (isLoading) {
            btn.innerHTML = '<span class="loading-spinner"></span> جاري...';
            btn.classList.add('btn-loading');
            btn.disabled = true;
        } else {
            btn.innerHTML = originalText;
            btn.classList.remove('btn-loading');
            btn.disabled = false;
        }
    }
    
    // Login
    document.getElementById('loginBtn').addEventListener('click', async () => {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        
        if (!email || !password) {
            showError('loginMsg', '⚠️ الرجاء إدخال البريد الإلكتروني وكلمة المرور');
            return;
        }
        
        setLoading('loginBtn', true, 'تسجيل الدخول');
        
        try {
            const userCredential = await auth.signInWithEmailAndPassword(email, password);
            const user = userCredential.user;
            
            // Check if user exists in database
            const snapshot = await db.ref(`users/${user.uid}`).once('value');
            if (!snapshot.exists()) {
                await db.ref(`users/${user.uid}`).set({
                    name: user.displayName || email.split('@')[0],
                    email: email,
                    bio: "مرحباً! أنا في المنصة ✨",
                    avatar: "",
                    cover: "",
                    website: "",
                    verified: false,
                    isAdmin: email === ADMIN_EMAIL,
                    blockedUsers: {},
                    mutedUntil: 0,
                    createdAt: Date.now()
                });
            }
            
            // Update admin status if needed
            if (email === ADMIN_EMAIL && password === ADMIN_PASSWORD) {
                await db.ref(`users/${user.uid}`).update({ isAdmin: true, verified: true, name: 'Admin' });
            }
            
            setLoading('loginBtn', false, 'تسجيل الدخول');
            window.location.href = 'index.html';
            
        } catch (error) {
            setLoading('loginBtn', false, 'تسجيل الدخول');
            let msg = '';
            switch (error.code) {
                case 'auth/user-not-found': msg = '❌ لا يوجد حساب بهذا البريد'; break;
                case 'auth/wrong-password': msg = '❌ كلمة المرور غير صحيحة'; break;
                case 'auth/invalid-email': msg = '❌ البريد الإلكتروني غير صالح'; break;
                case 'auth/too-many-requests': msg = '❌ تم تعطيل الحساب مؤقتاً'; break;
                default: msg = '❌ ' + error.message;
            }
            showError('loginMsg', msg);
        }
    });
    
    // Register
    document.getElementById('registerBtn').addEventListener('click', async () => {
        const name = document.getElementById('regName').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const password = document.getElementById('regPass').value;
        const confirmPass = document.getElementById('regConfirmPass').value;
        
        if (!name || !email || !password) {
            showError('regMsg', '⚠️ الرجاء ملء جميع الحقول');
            return;
        }
        
        if (password !== confirmPass) {
            showError('regMsg', '⚠️ كلمة المرور غير متطابقة');
            return;
        }
        
        if (password.length < 6) {
            showError('regMsg', '⚠️ كلمة المرور يجب أن تكون 6 أحرف على الأقل');
            return;
        }
        
        setLoading('registerBtn', true, 'إنشاء حساب');
        
        try {
            const userCredential = await auth.createUserWithEmailAndPassword(email, password);
            await userCredential.user.updateProfile({ displayName: name });
            
            await db.ref(`users/${userCredential.user.uid}`).set({
                name: name,
                email: email,
                bio: "مرحباً! أنا في المنصة ✨",
                avatar: "",
                cover: "",
                website: "",
                verified: false,
                isAdmin: email === ADMIN_EMAIL,
                blockedUsers: {},
                mutedUntil: 0,
                createdAt: Date.now()
            });
            
            setLoading('registerBtn', false, 'إنشاء حساب');
            window.location.href = 'index.html';
            
        } catch (error) {
            setLoading('registerBtn', false, 'إنشاء حساب');
            let msg = '';
            switch (error.code) {
                case 'auth/email-already-in-use': msg = '❌ البريد الإلكتروني مستخدم بالفعل'; break;
                case 'auth/invalid-email': msg = '❌ البريد الإلكتروني غير صالح'; break;
                case 'auth/weak-password': msg = '❌ كلمة المرور ضعيفة جداً'; break;
                default: msg = '❌ ' + error.message;
            }
            showError('regMsg', msg);
        }
    });
    
    // Check if already logged in
    auth.onAuthStateChanged((user) => {
        if (user) {
            window.location.href = 'index.html';
        }
    });
</script>

</body>
</html>
