<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | VIBE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #ff6b35, #f7b733);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            direction: rtl;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 32px;
            padding: 40px 32px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }
        .card h1 {
            font-size: 42px;
            font-weight: 800;
            text-align: center;
            background: linear-gradient(135deg, #ff6b35, #f7b733);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            background: #f0f0f0;
            border-radius: 60px;
            padding: 4px;
        }
        .tab {
            flex: 1;
            padding: 12px;
            background: none;
            border: none;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            color: #666;
        }
        .tab.active {
            background: linear-gradient(135deg, #ff6b35, #f7b733);
            color: white;
        }
        .form { display: none; }
        .form.active { display: block; }
        input {
            width: 100%;
            padding: 14px 16px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 16px;
            font-size: 15px;
            font-family: inherit;
            outline: none;
        }
        input:focus { border-color: #ff6b35; }
        button {
            width: 100%;
            padding: 14px;
            margin-top: 20px;
            background: linear-gradient(135deg, #ff6b35, #f7b733);
            border: none;
            border-radius: 16px;
            color: white;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
        }
        .error {
            color: #ff4444;
            font-size: 13px;
            margin-top: 10px;
            text-align: center;
        }
        .footer {
            text-align: center;
            margin-top: 25px;
            color: #888;
            font-size: 13px;
        }
        .footer a {
            color: #ff6b35;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid white;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-left: 8px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="card">
    <h1>✨ VIBE ✨</h1>
    
    <div class="tabs">
        <button class="tab active" id="tabLoginBtn">تسجيل الدخول</button>
        <button class="tab" id="tabRegisterBtn">إنشاء حساب</button>
    </div>
    
    <div id="loginForm" class="form active">
        <input type="email" id="loginEmail" placeholder="البريد الإلكتروني">
        <input type="password" id="loginPassword" placeholder="كلمة المرور">
        <button id="loginBtn">تسجيل الدخول</button>
        <div id="loginError" class="error"></div>
        <div class="footer">ليس لديك حساب؟ <a id="switchToRegister">إنشاء حساب</a></div>
    </div>
    
    <div id="registerForm" class="form">
        <input type="text" id="regName" placeholder="اسم المستخدم">
        <input type="email" id="regEmail" placeholder="البريد الإلكتروني">
        <input type="password" id="regPassword" placeholder="كلمة المرور">
        <input type="password" id="regConfirm" placeholder="تأكيد كلمة المرور">
        <button id="registerBtn">إنشاء حساب</button>
        <div id="registerError" class="error"></div>
        <div class="footer">لديك حساب؟ <a id="switchToLogin">تسجيل الدخول</a></div>
    </div>
</div>

<script src="firebase-config.js"></script>
<script>
    function showLogin() {
        document.getElementById('loginForm').classList.add('active');
        document.getElementById('registerForm').classList.remove('active');
        document.getElementById('tabLoginBtn').classList.add('active');
        document.getElementById('tabRegisterBtn').classList.remove('active');
        document.getElementById('loginError').innerHTML = '';
        document.getElementById('registerError').innerHTML = '';
    }
    
    function showRegister() {
        document.getElementById('registerForm').classList.add('active');
        document.getElementById('loginForm').classList.remove('active');
        document.getElementById('tabRegisterBtn').classList.add('active');
        document.getElementById('tabLoginBtn').classList.remove('active');
        document.getElementById('loginError').innerHTML = '';
        document.getElementById('registerError').innerHTML = '';
    }
    
    document.getElementById('tabLoginBtn').onclick = showLogin;
    document.getElementById('tabRegisterBtn').onclick = showRegister;
    document.getElementById('switchToRegister').onclick = showRegister;
    document.getElementById('switchToLogin').onclick = showLogin;
    
    function setLoading(btnId, loading, text) {
        const btn = document.getElementById(btnId);
        if (loading) {
            btn.innerHTML = '<span class="loading"></span> جاري...';
            btn.disabled = true;
        } else {
            btn.innerHTML = text;
            btn.disabled = false;
        }
    }
    
    // Login
    document.getElementById('loginBtn').onclick = async () => {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        
        if (!email || !password) {
            document.getElementById('loginError').innerHTML = '⚠️ الرجاء إدخال البريد وكلمة المرور';
            return;
        }
        
        setLoading('loginBtn', true, 'تسجيل الدخول');
        
        try {
            const result = await auth.signInWithEmailAndPassword(email, password);
            const snapshot = await db.ref(`users/${result.user.uid}`).once('value');
            if (!snapshot.exists()) {
                await db.ref(`users/${result.user.uid}`).set({
                    name: result.user.displayName || email.split('@')[0],
                    email: email,
                    bio: "مرحباً! أنا في VIBE ✨",
                    avatar: "", cover: "", website: "",
                    verified: false, isAdmin: email === ADMIN_EMAIL,
                    blockedUsers: {}, mutedUntil: 0, createdAt: Date.now()
                });
            }
            window.location.href = 'index.html';
        } catch (error) {
            let msg = '';
            if (error.code === 'auth/user-not-found') msg = '❌ لا يوجد حساب بهذا البريد';
            else if (error.code === 'auth/wrong-password') msg = '❌ كلمة المرور غير صحيحة';
            else if (error.code === 'auth/invalid-email') msg = '❌ البريد الإلكتروني غير صالح';
            else msg = '❌ ' + error.message;
            document.getElementById('loginError').innerHTML = msg;
            setLoading('loginBtn', false, 'تسجيل الدخول');
        }
    };
    
    // Register
    document.getElementById('registerBtn').onclick = async () => {
        const name = document.getElementById('regName').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const password = document.getElementById('regPassword').value;
        const confirm = document.getElementById('regConfirm').value;
        
        if (!name || !email || !password) {
            document.getElementById('registerError').innerHTML = '⚠️ الرجاء ملء جميع الحقول';
            return;
        }
        if (password !== confirm) {
            document.getElementById('registerError').innerHTML = '⚠️ كلمة المرور غير متطابقة';
            return;
        }
        if (password.length < 6) {
            document.getElementById('registerError').innerHTML = '⚠️ كلمة المرور 6 أحرف على الأقل';
            return;
        }
        
        setLoading('registerBtn', true, 'إنشاء حساب');
        
        try {
            const result = await auth.createUserWithEmailAndPassword(email, password);
            await result.user.updateProfile({ displayName: name });
            await db.ref(`users/${result.user.uid}`).set({
                name: name, email: email,
                bio: "مرحباً! أنا في VIBE ✨",
                avatar: "", cover: "", website: "",
                verified: false, isAdmin: email === ADMIN_EMAIL,
                blockedUsers: {}, mutedUntil: 0, createdAt: Date.now()
            });
            window.location.href = 'index.html';
        } catch (error) {
            let msg = '';
            if (error.code === 'auth/email-already-in-use') msg = '❌ البريد الإلكتروني مستخدم بالفعل';
            else if (error.code === 'auth/invalid-email') msg = '❌ البريد الإلكتروني غير صالح';
            else if (error.code === 'auth/weak-password') msg = '❌ كلمة المرور ضعيفة جداً';
            else msg = '❌ ' + error.message;
            document.getElementById('registerError').innerHTML = msg;
            setLoading('registerBtn', false, 'إنشاء حساب');
        }
    };
    
    auth.onAuthStateChanged((user) => {
        if (user) window.location.href = 'index.html';
    });
</script>
</body>
</html>
